---
layout: default
---
<article>
  <div class="page-header">
    <div class="page-header-inner">
      <nav class="breadcrumb" aria-label="Breadcrumb">
        <a href="{{ '/' | relative_url }}">Home</a>
        <span>/</span>
        <a href="{{ '/academics/' | relative_url }}">Academics</a>
        <span>/</span>
        <span class="here">{{ page.title }}</span>
      </nav>
      <span class="page-eyebrow">Project</span>
      {% if page.status %}<span class="status-badge status-{{ page.status | downcase | replace: ' ', '-' }}" style="margin-bottom:.75rem;display:inline-block;">{{ page.status }}</span>{% endif %}
      <h1 class="page-title">{{ page.title }}</h1>
      {% if page.excerpt %}<p class="page-subtitle">{{ page.excerpt }}</p>{% endif %}
      {% if page.tags.size > 0 %}
      <div class="post-tags" style="margin-top:1rem;">
        {% for tag in page.tags %}<span class="tag">{{ tag }}</span>{% endfor %}
      </div>
      {% endif %}
    </div>
  </div>
  <div class="content-body">
    <div class="content-prose">{{ content }}</div>
  </div>
</article>
